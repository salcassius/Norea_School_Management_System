name: Deploy to InfinityFree

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Frontend Dependencies
        working-directory: school-frontend
        run: npm ci

      - name: Build Vue
        working-directory: school-frontend
        run: npm run build

      - name: Prepare Deploy Folder
        run: |
          mkdir deploy
          mkdir deploy/laravel

          # Copy Laravel project
          cp -R school-backend/* deploy/laravel/

          # Copy Laravel public files to htdocs
          cp -R school-backend/public/* deploy/

          # Replace assets with Vue build
          rm -rf deploy/assets
          cp -R school-frontend/dist/* deploy/

      - name: Upload to InfinityFree
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: deploy/
          server-dir: /htdocs/